networks:
  pms_network:
    driver: bridge
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  storage_data:
    driver: local
services:
  nginx:
    image: nginx:1.25-alpine
    container_name: pms_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - storage_data:/var/www/html/storage/app
    depends_on:
      - php
    networks:
      - pms_network
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "5" }
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: pms_php
    restart: unless-stopped
    volumes:
      - .:/var/www/html:cached
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - storage_data:/var/www/html/storage/app
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pms_network
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "5" }
  postgres:
    image: postgres:16-alpine
    container_name: pms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-pms_production}
      POSTGRES_USER: ${DB_USERNAME:-pms_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-pms_user} -d ${DB_DATABASE:-pms_production}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pms_network
  redis:
    image: redis:7.2-alpine
    container_name: pms_redis
    restart: unless-stopped
    command: redis-server /etc/redis/redis.conf --requirepass ${REDIS_PASSWORD:-secret}
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/etc/redis/redis.conf:ro
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - pms_network
  queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: pms_queue
    restart: unless-stopped
    command: /usr/bin/supervisord -n -c /etc/supervisor/conf.d/supervisord.conf
    volumes:
      - .:/var/www/html:cached
      - ./docker/supervisor/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf:ro
      - storage_data:/var/www/html/storage/app
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pms_network
  reverb:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: pms_reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --no-interaction
    volumes:
      - .:/var/www/html:cached
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      - redis
    networks:
      - pms_network
  scheduler:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: pms_scheduler
    restart: unless-stopped
    command: sh -c "while true; do php /var/www/html/artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html:cached
      - storage_data:/var/www/html/storage/app
    env_file: .env
    depends_on:
      - postgres
      - redis
    networks:
      - pms_network
